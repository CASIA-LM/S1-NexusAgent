# AIO Sandbox Docker Compose配置
# 支持动态session目录挂载

version: '3.8'

services:
  aio-sandbox:
    container_name: nexus-aio-sandbox
    image: ghcr.io/agent-infra/sandbox:latest

    # 动态挂载配置(通过环境变量或脚本生成)
    # volumes将在运行时通过Python代码动态添加
    volumes:
      # Session directories are mounted dynamically at runtime by Python code.
      # Example layout (actual paths are configured via NEXUS_DATA_DIR env var):
      # - /your/data/dir/sessions/{session_id}/workspace:/home/gem/workspace
      # - /your/data/dir/sessions/{session_id}/uploads:/home/gem/uploads
      # - /your/data/dir/sessions/{session_id}/outputs:/home/gem/outputs
      - /tmp/nexus_temp:/tmp/nexus_temp

    security_opt:
      - seccomp:unconfined

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: "unless-stopped"

    shm_size: "2gb"

    ports:
      - "${SANDBOX_PORT:-9001}:8080"

    environment:
      # 代理配置(可选)
      PROXY_SERVER: ${PROXY_SERVER:-}

      # 工作目录
      WORKSPACE: "/home/gem"

      # 时区
      TZ: "Asia/Shanghai"

      # 主页(可选)
      HOMEPAGE: ${HOMEPAGE:-}

      # 浏览器额外参数(可选)
      BROWSER_EXTRA_ARGS: ${BROWSER_EXTRA_ARGS:-}

      # JWT公钥(可选,用于认证)
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}

    # 资源限制
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/sandbox"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 网络配置
networks:
  default:
    name: nexus-network
    driver: bridge
